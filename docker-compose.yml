# Local infra for development: Postgres + Redis.
# Start with: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodhall
      POSTGRES_PASSWORD: foodhall
      POSTGRES_DB: foodhall
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
